# TrackNet V2 Training Configuration

# Model
in_channels: 9
seq_len: 3
input_size: [512, 288]
heatmap_radius: 30

# Optimizer
optimizer: AdamW
learning_rate: 1.0e-4

# LR Schedule
lr_schedule:
  name: MultiStepLR
  milestones: [20, 25]
  gamma: 0.1

# Training
batch_size: 2
epochs: 30
seed: 42

# DataLoader
num_workers: 4
pin_memory: true
persistent_workers: true

# Mixed Precision
amp_dtype: bfloat16

# torch.compile
compile_model: true

# Checkpointing
checkpoint_dir: checkpoints
experiment_name: default

# TensorBoard
log_dir: runs

# Detection
detection_threshold: 0.5
distance_threshold: 4
